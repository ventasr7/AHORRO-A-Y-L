<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Capital IA - Planificador Financiero</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-20">

    <div id="app" class="max-w-6xl mx-auto mt-8 px-4">
        <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200">
            
            <div class="bg-slate-900 p-8 text-white flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <div class="p-3 bg-emerald-500 rounded-2xl shadow-lg shadow-emerald-500/20">
                        <i class="fas fa-robot text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-black uppercase tracking-tighter italic leading-none">Mi Capital IA</h1>
                        <p id="mode-label" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Configuración Inicial</p>
                    </div>
                </div>
                <div id="header-stats" class="hidden flex gap-6">
                    <div class="text-right">
                        <span class="text-[9px] font-black text-slate-500 block uppercase">Ingreso <span id="stat-freq"></span></span>
                        <span id="stat-income" class="text-lg font-black text-white">$0</span>
                    </div>
                    <div class="text-right border-l border-white/10 pl-6">
                        <span id="stat-goal-name" class="text-[9px] font-black text-slate-500 block uppercase">Meta</span>
                        <span id="stat-goal-val" class="text-lg font-black text-emerald-400">$0</span>
                    </div>
                    <button onclick="resetData()" class="ml-4 text-slate-500 hover:text-red-400 text-xs uppercase font-black tracking-widest">
                        <i class="fas fa-trash-alt mr-1"></i> Borrar Todo
                    </button>
                </div>
            </div>

            <div class="p-8">
                
                <div id="step-1" class="space-y-8">
                    <div class="text-center mb-10">
                        <h2 class="text-3xl font-black text-slate-800 uppercase tracking-tighter">¿Cómo recibes tu dinero?</h2>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <button onclick="setMode('quincenal')" class="group p-8 border-4 border-slate-50 rounded-[2.5rem] hover:border-emerald-500 transition-all text-left bg-slate-50/50">
                            <h3 class="text-xl font-black uppercase text-slate-700">Quincenal</h3>
                            <p class="text-sm text-slate-400 mt-2">Cada 15 y 30 del mes.</p>
                        </button>

                        <button onclick="setMode('semanal')" class="group p-8 border-4 border-slate-50 rounded-[2.5rem] hover:border-indigo-500 transition-all text-left bg-slate-50/50">
                            <h3 class="text-xl font-black uppercase text-slate-700">Semanal</h3>
                            <p class="text-sm text-slate-400 mt-2">Cada 7 días.</p>
                        </button>
                    </div>

                    <div id="config-inputs" class="hidden mt-10 space-y-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-4">
                                <label class="text-xs font-black text-slate-400 uppercase tracking-widest">¿Cuánto ganas por pago?</label>
                                <input type="number" id="input-income" class="w-full p-8 bg-slate-50 border-2 border-transparent focus:border-emerald-500 rounded-[2rem] text-4xl font-black outline-none" placeholder="0.00">
                            </div>
                            <div class="space-y-4">
                                <label class="text-xs font-black text-slate-400 uppercase tracking-widest">Nombre de tu Meta / Monto Objetivo</label>
                                <input type="text" id="input-goal-name" class="w-full p-4 bg-slate-50 border rounded-2xl mb-2 font-bold" placeholder="Ej: Ahorro Navideño">
                                <input type="number" id="input-goal-target" class="w-full p-4 bg-slate-50 border rounded-2xl font-black" placeholder="Monto objetivo $">
                            </div>
                        </div>
                        <button onclick="saveAndGoTo(3)" class="w-full bg-slate-900 text-white p-7 rounded-[2rem] font-black uppercase shadow-xl hover:bg-emerald-600">
                            Guardar y Continuar
                        </button>
                    </div>
                </div>

                <div id="step-3" class="hidden space-y-6">
                    <div class="bg-slate-50 p-8 rounded-[2.5rem] border border-slate-200 space-y-5">
                        <h3 class="font-black text-xs uppercase text-slate-400">Registrar un Pago</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" id="debt-name" placeholder="¿Qué pagarás?" class="p-5 rounded-2xl border font-bold">
                            <input type="number" id="debt-amount" placeholder="Monto $" class="p-5 rounded-2xl border font-bold">
                        </div>
                        <div class="flex items-center justify-between">
                             <label class="flex items-center gap-3 cursor-pointer">
                                <input type="checkbox" id="debt-recurring" class="w-6 h-6 accent-emerald-500">
                                <span class="text-[11px] font-black text-slate-500 uppercase">Gasto recurrente</span>
                            </label>
                            <button onclick="addDebt()" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black uppercase text-xs">Añadir</button>
                        </div>
                    </div>
                    <div id="debts-list" class="space-y-3 max-h-[300px] overflow-y-auto custom-scrollbar"></div>
                    <button onclick="calculatePlan()" class="w-full bg-emerald-600 text-white p-7 rounded-[2rem] font-black uppercase shadow-2xl">
                        Calcular Mi Plan
                    </button>
                </div>

                <div id="step-4" class="hidden space-y-10">
                    <div id="results-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
                    <div id="saving-card" class="rounded-[3.5rem] p-10 text-white shadow-2xl transition-all duration-500">
                        <div class="flex flex-col md:flex-row justify-between gap-8 mb-8">
                            <div>
                                <h2 class="text-4xl font-black italic uppercase tracking-tighter" id="saving-title">Tu Ahorro</h2>
                                <p id="saving-goal-label" class="text-xs font-bold uppercase opacity-80 mt-2"></p>
                            </div>
                            <div class="bg-black/20 p-8 rounded-[2.5rem] text-center min-w-[200px]">
                                <span id="suggested-saving" class="text-5xl font-black tracking-tighter">$0</span>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <div class="flex justify-between text-[10px] font-black uppercase">
                                <span>Llevas: $<span id="current-saved-val">0</span></span>
                                <span id="percent-val">0%</span>
                            </div>
                            <div class="h-10 bg-black/10 rounded-full p-1.5 border border-white/10">
                                <div id="progress-bar" class="h-full bg-white rounded-full transition-all duration-1000 shadow-lg" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="mt-8 bg-white p-2 rounded-[2rem] flex flex-col md:flex-row gap-2">
                            <input type="number" id="manual-save-input" class="flex-1 bg-transparent p-4 text-slate-900 font-black outline-none text-xl" placeholder="Ahorro de hoy">
                            <button onclick="registerManualSave()" class="bg-slate-900 px-8 py-4 rounded-[1.5rem] font-black uppercase text-xs hover:bg-emerald-500">Sumar al Ahorro</button>
                        </div>
                    </div>
                    <button onclick="goToStep(3)" class="w-full p-6 border-2 border-slate-200 rounded-3xl font-black text-xs text-slate-400 uppercase">Ajustar Datos</button>
                </div>

            </div>
        </div>
    </div>

    <script>
        // Variables de estado
        let state = {
            step: 1,
            mode: "",
            income: 0,
            goalName: "",
            goalTarget: 0,
            debts: [],
            totalSaved: 0
        };

        // Al cargar la página
        window.onload = () => {
            const savedState = localStorage.getItem('miCapitalData');
            if (savedState) {
                state = JSON.parse(savedState);
                if (state.mode) setMode(state.mode, false);
                // Rellenar inputs
                document.getElementById('input-income').value = state.income || "";
                document.getElementById('input-goal-name').value = state.goalName || "";
                document.getElementById('input-goal-target').value = state.goalTarget || "";
                
                renderDebts();
                if (state.step > 1) goToStep(state.step);
                if (state.step === 4) calculatePlan(false);
            }
        };

        function saveState() {
            localStorage.setItem('miCapitalData', JSON.stringify(state));
        }

        function setMode(selected, shouldSave = true) {
            state.mode = selected;
            document.getElementById('config-inputs').classList.remove('hidden');
            document.getElementById('mode-label').innerText = "Modo " + state.mode;
            if(shouldSave) saveState();
        }

        function goToStep(step) {
            state.step = step;
            document.querySelectorAll('#step-1, #step-3, #step-4').forEach(el => el.classList.add('hidden'));
            document.getElementById('step-' + step).classList.remove('hidden');

            if(step >= 3) {
                document.getElementById('header-stats').classList.remove('hidden');
                document.getElementById('stat-freq').innerText = state.mode;
                document.getElementById('stat-income').innerText = "$" + state.income;
                document.getElementById('stat-goal-name').innerText = state.goalName;
                document.getElementById('stat-goal-val').innerText = "$" + state.goalTarget;
            }
            saveState();
        }

        function saveAndGoTo(step) {
            state.income = parseFloat(document.getElementById('input-income').value) || 0;
            state.goalName = document.getElementById('input-goal-name').value || "Mi Meta";
            state.goalTarget = parseFloat(document.getElementById('input-goal-target').value) || 0;
            goToStep(step);
        }

        function addDebt() {
            const name = document.getElementById('debt-name').value;
            const amount = parseFloat(document.getElementById('debt-amount').value);
            const isRecurring = document.getElementById('debt-recurring').checked;

            if (name && amount) {
                state.debts.push({ id: Date.now(), name, amount, isRecurring });
                document.getElementById('debt-name').value = '';
                document.getElementById('debt-amount').value = '';
                document.getElementById('debt-recurring').checked = false;
                renderDebts();
                saveState();
            }
        }

        function removeDebt(id) {
            state.debts = state.debts.filter(d => d.id !== id);
            renderDebts();
            saveState();
        }

        function renderDebts() {
            const list = document.getElementById('debts-list');
            list.innerHTML = state.debts.map(d => `
                <div class="flex justify-between items-center p-5 bg-white border rounded-2xl shadow-sm">
                    <div class="flex items-center gap-4">
                        <div class="p-3 rounded-xl ${d.isRecurring ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-50 text-slate-400'}">
                            <i class="fas ${d.isRecurring ? 'fa-sync-alt' : 'fa-credit-card'}"></i>
                        </div>
                        <div>
                            <p class="font-black text-slate-800 uppercase text-xs">${d.name}</p>
                            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">${d.isRecurring ? 'Gasto Fijo' : 'Pago Único'}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-mono font-black text-lg">$${d.amount}</span>
                        <button onclick="removeDebt(${d.id})" class="text-slate-200 hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function calculatePlan(shouldSave = true) {
            const numPeriods = (state.mode === 'semanal') ? 4 : 2;
            const grid = document.getElementById('results-grid');
            grid.innerHTML = "";

            let periodData = Array.from({ length: numPeriods }, (_, i) => ({ id: i + 1, pagos: [], totalOut: 0 }));

            state.debts.forEach((d, index) => {
                if(d.isRecurring) {
                    periodData.forEach(p => { p.pagos.push(d); p.totalOut += d.amount; });
                } else {
                    const targetPeriod = index % numPeriods;
                    periodData[targetPeriod].pagos.push(d);
                    periodData[targetPeriod].totalOut += d.amount;
                }
            });

            let totalCleanOverall = 0;
            periodData.forEach(p => {
                const clean = state.income - p.totalOut;
                totalCleanOverall += clean;
                const color = (state.mode === 'semanal') ? 'indigo' : 'emerald';
                
                const card = document.createElement('div');
                card.className = "bg-white border-2 border-slate-100 rounded-[2.5rem] overflow-hidden flex flex-col shadow-lg";
                card.innerHTML = `
                    <div class="bg-slate-50 p-6 flex justify-between items-center border-b">
                        <span class="w-10 h-10 bg-${color}-500 rounded-xl flex items-center justify-center text-white font-black">${p.id}</span>
                        <h3 class="font-black text-slate-900 uppercase text-xs">${state.mode} ${p.id}</h3>
                    </div>
                    <div class="p-6 flex-1 space-y-2">
                        ${p.pagos.map(item => `<div class="flex justify-between text-[10px] font-bold uppercase"><span>${item.name}</span><span>$${item.amount}</span></div>`).join('')}
                    </div>
                    <div class="p-6 bg-slate-900 text-white">
                        <div class="flex justify-between items-end border-t border-white/10 pt-4">
                            <span class="text-[10px] font-black text-${color}-400 uppercase">Saldo Limpio</span>
                            <span class="text-3xl font-black">$${clean}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            const avgClean = totalCleanOverall / numPeriods;
            const suggested = Math.floor(avgClean * 0.4);

            document.getElementById('saving-card').style.backgroundColor = (state.mode === 'semanal') ? '#4f46e5' : '#059669';
            document.getElementById('saving-title').innerText = "Tu Ahorro " + state.mode;
            document.getElementById('suggested-saving').innerText = "$" + suggested;
            document.getElementById('saving-goal-label').innerText = "Meta: " + state.goalName;

            updateProgress();
            if(shouldSave) goToStep(4);
        }

        function registerManualSave() {
            const input = document.getElementById('manual-save-input');
            const val = parseFloat(input.value);
            if(!isNaN(val)) {
                state.totalSaved += val;
                input.value = "";
                updateProgress();
                saveState();
            }
        }

        function updateProgress() {
            const percent = Math.min(100, (state.totalSaved / state.goalTarget) * 100).toFixed(1);
            document.getElementById('current-saved-val').innerText = state.totalSaved;
            document.getElementById('percent-val').innerText = percent + "%";
            document.getElementById('progress-bar').style.width = percent + "%";
        }

        function resetData() {
            if(confirm("¿Seguro que quieres borrar todos los datos?")) {
                localStorage.removeItem('miCapitalData');
                location.reload();
            }
        }
    </script>
</body>
</html>
